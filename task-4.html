<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{background:#f5f7fa;color:#333;}

nav{
background:#111;color:white;
display:flex;justify-content:space-between;
padding:15px 40px;
}
nav h2{color:#00adb5;}
nav span{margin-left:20px;cursor:pointer;}

.page{display:none;}
.active{display:block;}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

.section{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.flex{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:220px;
background:#fafafa;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;
}
.card:hover{transform:translateY(-4px);}

button{
margin-top:10px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#00adb5;
color:white;
cursor:pointer;
}
button:hover{background:#007b80;}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

li{
margin-top:10px;
padding:8px;
background:#eee;
border-radius:6px;
}

.fullpage{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:white;
padding:30px;
overflow:auto;
display:none;
}

.product-card{width:220px;}
.product-card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.cart-box{
background:#fafafa;
padding:12px;
margin-top:10px;
border-radius:8px;
}
.total{margin-top:10px;font-weight:bold;}

#addressPopup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}
.popup-box{
background:white;
width:300px;
margin:100px auto;
padding:20px;
border-radius:10px;
color:black;
}
</style>
</head>

<body>

<nav>
<h2>My Portfolio</h2>
<div>
<span onclick="showPage('home')">Home</span>
<span onclick="showPage('cart')">Cart 🛒</span>
</div>
</nav>

<div id="home" class="page active">
<div class="container">

<div class="section">
<h1>About Me</h1>
<p>I am a Web Developer skilled in HTML, CSS, JavaScript.</p>
</div>

<div class="section">
<h2>Projects</h2>
<div class="flex">
<div class="card">
<h3>To-Do App</h3>
<button onclick="showPage('todo')">Open</button>
</div>
<div class="card">
<h3>Product Listing</h3>
<button onclick="openProducts()">View</button>
</div>
</div>
</div>

<div class="section">
<h2>To-Do</h2>
<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>
</div>

<div class="section">
<h2>Contact</h2>
<form onsubmit="submitForm(event)">
<input id="name" placeholder="Name" required>
<input id="email" type="email" placeholder="Email" required>
<textarea id="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form>
<p id="successMsg" style="color:green;display:none;">Message sent successfully ✅</p>
</div>

</div>
</div>
<div id="todo" class="page">
<div class="container">
<h1>To-Do Manager</h1>
<input id="taskInput2" placeholder="Enter task">
<button onclick="addTask2()">Add</button>
<ul id="taskList2"></ul>
</div>
</div>

<div id="cart" class="page">
<div class="container">
<h1>Cart</h1>
<div id="cartItems"></div>
<p class="total" id="total"></p>
<button onclick="buyNow()">Buy Now</button>
</div>
</div>

<div id="productPage" class="fullpage">
<h1>Products</h1>
<button onclick="closeProducts()">⬅ Back</button>

<br><br>

<select id="filter" onchange="displayProducts()">
<option value="all">All</option>
<option value="electronics">Electronics</option>
<option value="clothes">Clothes</option>
</select>

<div class="flex" id="productList"></div>
</div>

<div id="addressPopup">
<div class="popup-box">
<h3>Delivery Address</h3>
<input id="custName" placeholder="Full Name">
<input id="custPhone" placeholder="Phone Number" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<textarea id="custAddress" placeholder="Address"></textarea>
<button onclick="placeOrder()">Place Order</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="cart") showCart();
}

function openProducts(){document.getElementById("productPage").style.display="block";}
function closeProducts(){document.getElementById("productPage").style.display="none";}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask(){
let input=document.getElementById("taskInput");
if(input.value==="") return;
tasks.push(input.value);
localStorage.setItem("tasks",JSON.stringify(tasks));
input.value="";
showTasks();
}
function showTasks(){
let list=document.getElementById("taskList");
list.innerHTML="";
tasks.forEach((t,i)=>{
list.innerHTML+=`<li>${t} <button onclick="deleteTask(${i})">X</button></li>`;
});
}
function deleteTask(i){
tasks.splice(i,1);
localStorage.setItem("tasks",JSON.stringify(tasks));
showTasks();
}
showTasks();

function submitForm(e){
e.preventDefault();
document.getElementById("successMsg").style.display="block";
}

let products=[
{name:"Smartphone",price:15000,category:"electronics",img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"Laptop",price:50000,category:"electronics",img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Shirt",price:1000,category:"clothes",img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{name:"Jeans",price:2000,category:"clothes",img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function displayProducts(){
let filter=document.getElementById("filter").value;
let filtered=products.filter(p=>filter==="all"||p.category===filter);

let container=document.getElementById("productList");
container.innerHTML="";

filtered.forEach((p,i)=>{
container.innerHTML+=`
<div class="card product-card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addToCart(${i})">Add to Cart</button>
</div>`;
});
}
displayProducts();

function addToCart(i){
cart.push(products[i]);
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to cart");
}

function showCart(){
let container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach((p,i)=>{
total+=p.price;
container.innerHTML+=`
<div class="cart-box">
${p.name} - ₹${p.price}
<button onclick="removeCart(${i})">Remove</button>
</div>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function removeCart(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
showCart();
}

function buyNow(){
if(cart.length===0){
alert("Cart is empty!");
return;
}
document.getElementById("addressPopup").style.display="block";
}

function closePopup(){
document.getElementById("addressPopup").style.display="none";
}

function placeOrder(){
    let name = document.getElementById("custName").value.trim();
    let phone = document.getElementById("custPhone").value.trim();
    let address = document.getElementById("custAddress").value.trim();
    let phonePattern = /^[0-9]{10}$/;

    if(!name || !phone || !address){
        alert("Please fill all details!");
        return;
    }

    if(!phonePattern.test(phone)){
        alert("Enter valid 10-digit phone number!");
        return;
    }

    alert("Order placed successfully 🎉");

    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    showCart();

    closePopup();
}
</script>

</body>
</html>
